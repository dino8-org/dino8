name: Fetch Release Downloads

on:
  repository_dispatch:
    types: [release-published]

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        run: |
          mkdir -p downloads
          gh release download "${{ github.event.client_payload.tag }}" \
            --repo Pomb/dino8 \
            --dir downloads \
            --pattern '*.tar.gz' \
            --pattern '*.zip'
          ls -la downloads/
        env:
          GH_TOKEN: ${{ secrets.DINO8_REPO_TOKEN }}

      - name: Commit and push downloads
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Update downloads for ${{ github.event.client_payload.tag }}" || echo "No changes to commit"
          git push
