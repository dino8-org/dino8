<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dino8 Tutorials</title>
  <link rel="icon" href="../favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="../shared.css">
  <link rel="stylesheet" href="../tutorials.css">
</head>
<body>
  <div class="tutorials-index">
    <a href="../" class="back">&larr; Dino8</a>
    <h1>TUTORIALS</h1>
    <p class="subtitle">Step-by-step guides to learn how Dino8 works.</p>
    <div id="tutorial-list"></div>
  </div>

  <script src="../components/carousel.js"></script>
  <script>
    var tutorials = [
      {
        title: "Breakout",
        tags: ["drawing", "input", "audio", "game logic"],
        description: "Learn the core Dino8 workflow: project setup, drawing with primitives, handling input, managing game state, collision detection, and printing text to the screen.",
        href: "breakout/",
        label: "Build Breakout",
        images: [
          "breakout/breakout-01.gif",
          "breakout/breakout-02.gif",
          "breakout/breakout-03.gif",
        ],
      },
      {
        title: "Shaders",
        tags: ["shaders", "render targets"],
        description: "Write custom fragment shaders in GLSL. Load them from file or inline, set uniforms, update values at runtime, and apply effects to specific screen regions with masks.",
        href: "shaders-1/",
        label: "Build Shaders",
        images: [
          "shaders-1/shaders-1-01.gif",
        ],
      },
      {
        title: "Pinball",
        tags: ["physics", "camera", "input"],
        description: "Plan a pinball layout with debug tools, build it from a data file, then bring it to life with physics — flippers, bumpers, a spring launcher, and smooth camera follow.",
        href: "physics/",
        label: "Build Pinball",
        images: [
          "physics/pinball-01.gif",
          "physics/pinball-02.gif",
        ],
      },
    ];

    (function() {
      var list = document.getElementById('tutorial-list');

      tutorials.forEach(function(t) {
        var card = document.createElement('div');
        card.className = 'tutorial-card';

        var tags = t.tags.map(function(tag) {
          return '<span class="tag">' + tag + '</span>';
        }).join('');

        var carouselWrap = document.createElement('div');
        carouselWrap.className = 'carousel-wrap';

        card.innerHTML = '<div class="tutorial-row">' +
          '<div class="tutorial-text">' +
            '<h2>' + t.title + '</h2>' +
            '<div class="tutorial-tags">' + tags + '</div>' +
            '<p>' + t.description + '</p>' +
            '<a href="' + t.href + '" class="tutorial-btn">' + t.label + ' &rarr;</a>' +
          '</div>' +
        '</div>';

        if (t.images.length > 0) {
          card.querySelector('.tutorial-row').appendChild(carouselWrap);
          Carousel.create(carouselWrap, t.images, t.title, 4000);
        }

        list.appendChild(card);
      });
    })();
  </script>
<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "cc48fbbc3c48445f90d3c06acf5a97f8"}'></script>
</body>
</html>
